name: Cursor Agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  cursor-agent:
    if: |
      contains(github.event.comment.body, '/cursor') &&
      github.event.comment.author_association == 'OWNER' &&
      (
        github.event_name == 'pull_request_review_comment' ||
        github.event_name == 'issue_comment'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Run Cursor Agent
        env:
          # Required secret for Cursor CLI authentication in CI.
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          agent --trust -p "$(cat <<'EOF'
          You are running as a Cursor agent in GitHub Actions.
          Trigger command: /cursor
          Repository: ${{ github.repository }}
          Event: ${{ github.event_name }}
          Actor: ${{ github.actor }}
          Comment body:
          ${{ github.event.comment.body }}

          If this is a pull request context, review the current repository state and provide a concise, actionable response for the author.
          EOF
          )"
